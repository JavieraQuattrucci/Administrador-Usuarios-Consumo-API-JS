<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Usuarios API</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <main class="container">
        <h1>Panel de Control de Usuarios</h1>
        <p>Abre la consola del navegador (F12) para ver los resultados de las acciones.</p>
        
        <div class="grid-botones">
            <button id="btn-listar-nombres" onclick="mostrarLista()">Listar Nombres</button>
            <button id="btn-info-basica">Información Básica</button>
            <button id="btn-direccion">Dirección Completa</button>
            <button id="btn-info-avanzada">Información Avanzada</button>
            <button id="btn-companias">Compañías y Frases</button>
            <button id="btn-ordenados">Nombres Ordenados A-Z</button>
        </div>
        <div class="grid-lista">
            <div id="salida-lista"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
